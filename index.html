<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="app.css">
    <script src="https://kit.fontawesome.com/849312d1d4.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <main>
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col gap-10 items-center justify-center py-10">
                <div class="flex flex-col items-center gap-4">
                    <h1>Fight Game</h1>

                    <div id="result-wrapper" class="hidden flex-col gap-3 items-center text-xl font-semibold">
                        <p>Time: <span id="time" class="text-blue-500">0</span></p>
                        <p>Defeated Enemies: <span id="defeated-enemies" class="text-blue-500">0</span></p>
                        <button id="reset-btn">Play Again</button>
                    </div>

                    <form id="select-form" class="flex gap-3">
                        <div class="flex flex-col gap-1">
                            <label for="select-count" class="font-semibold">Enemies Count</label>
                            <select id="select-count" name="count"></select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label for="select-size" class="font-semibold">Fields size</label>
                            <select id="select-size" name="size"></select>
                        </div>
                       <div class="self-end">
                           <button>Start Game</button>
                       </div>
                    </form>
                </div>

                <div id="game-wrapper" class="grid shadow-[0_0_2px_gray]"></div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed hidden top-0 size-full bg-[#00000066]">
        <div class="absolute top-1/2 left-1/2 -translate-1/2">
            <div class="relative min-w-96 flex flex-col gap-5 rounded-lg bg-white p-8">
                <span id="close-btn" class="absolute top-3 right-4 text-xl cursor-pointer">
                    <i class="fa-solid fa-x"></i>
                </span>
                <h1 class="text-3xl font-bold text-blue-500">You Win!</h1>
                <p class="text-2xl font-semibold">Completion Time: <span id="completion-time">0</span></p>
                <div>
                    <button id="play-btn">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
